# =============================================================================
# Claude Code Dev Environment - Multi-agent
#
# Usage:
#   ./agent.sh start my-project       # start agent "my-project"
#   ./agent.sh attach my-project      # attach to agent
#   ./agent.sh stop my-project        # stop agent
#   ./agent.sh list                   # list running agents
# =============================================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-${AGENT:-default}
    hostname: claude-${AGENT:-default}
    stdin_open: true
    tty: true

    environment:
      - AGENT=${AGENT:-default}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - SONAR_HOST_URL=${SONAR_HOST_URL:-http://host.docker.internal:9000}
      - SONAR_LOGIN=${SONAR_LOGIN:-admin}
      - SONAR_PASSWORD=${SONAR_PASSWORD:-admin}

    volumes:
      # Each agent gets unique path for Claude Code project isolation (/workspace/{name})
      - ./agent-data/${AGENT:-default}:/workspace/${AGENT:-default}

      # Entire home dir shared between all agents
      # Auth (.claude.json), config (.claude/), maven (.m2), npm (.npm) - all persist
      - claude-home:/home/node

      # Git credentials from host (read-only)
      # SSH keys from host (not read-only - known_hosts needs to be writable)
      - ${HOME}/.ssh:/home/node/.ssh

      # Live-mounted config - edit on host, agents see changes immediately (no rebuild)
      - ./skills:/opt/claude/skills:ro
      - ./hooks:/opt/claude/hooks:ro
      - ./CLAUDE.md:/opt/claude/CLAUDE.md:ro
      - ./settings.json:/opt/claude/settings.json:ro

    networks:
      - dev-net

    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

networks:
  dev-net:
    driver: bridge

volumes:
  claude-home:
    name: claude-home
