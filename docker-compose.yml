# =============================================================================
# Claude Code Dev Environment - Multi-agent
#
# Usage:
#   ./agent.sh start my-project       # start agent "my-project"
#   ./agent.sh attach my-project      # attach to agent
#   ./agent.sh stop my-project        # stop agent
#   ./agent.sh list                   # list running agents
# =============================================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-${AGENT:-default}
    hostname: claude-${AGENT:-default}
    stdin_open: true
    tty: true

    environment:
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - SONAR_HOST_URL=${SONAR_HOST_URL:-http://host.docker.internal:9000}
      - SONAR_LOGIN=${SONAR_LOGIN:-admin}
      - SONAR_PASSWORD=${SONAR_PASSWORD:-admin}

    volumes:
      # Each agent gets its own workspace subfolder
      - ./workspace/${AGENT:-default}:/workspace

      # Each agent gets its own Claude config (session, memory, history)
      - ./agents/${AGENT:-default}/claude:/home/node/.claude

      # Maven and npm cache shared between all agents
      - maven-repo:/home/node/.m2
      - npm-cache:/home/node/.npm

      # Git credentials from host (read-only)
      - ${HOME}/.ssh:/home/node/.ssh:ro

    networks:
      - dev-net

    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

networks:
  dev-net:
    driver: bridge

volumes:
  maven-repo:
  npm-cache:
